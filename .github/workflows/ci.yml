name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to test (e.g. v0.8.8)"
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Setup — install fcoreutils, generate data, measure sizes (runs once)
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fcoreutils ${{ inputs.version }}
        run: bash scripts/install_from_github.sh --version ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install hyperfine
        run: sudo apt-get install -y hyperfine

      - name: Generate test data
        run: bash tests/helpers/generate_test_data.sh

      - name: Measure binary sizes
        run: |
          python3 - <<'EOF'
          import json, os, shutil, subprocess

          INSTALL_DIR = os.path.expanduser("~/.local/bin")

          tools = []
          if os.path.isdir(INSTALL_DIR):
              for name in sorted(os.listdir(INSTALL_DIR)):
                  if name.startswith("f") and os.path.isfile(os.path.join(INSTALL_DIR, name)):
                      tools.append(name[1:])

          rows = {}
          for tool in tools:
              f_path = os.path.join(INSTALL_DIR, "f" + tool)
              gnu_path = shutil.which(tool)
              f_size = os.path.getsize(f_path) if os.path.exists(f_path) else None
              if f_size is None:
                  continue
              rows[tool] = {
                  "f_bytes": f_size,
                  "gnu_bytes": os.path.getsize(gnu_path) if gnu_path else None,
              }

          out = {
              "type": "sizes",
              "platform": subprocess.check_output(["uname", "-sm"]).decode().strip(),
              "sizes": rows,
          }

          os.makedirs("results", exist_ok=True)
          with open("results/sizes.json", "w") as f:
              json.dump(out, f, indent=2)
          print(f"Binary sizes measured for {len(rows)} tools")
          EOF

      - name: Package setup artifact
        run: |
          mkdir -p ci-setup/bin ci-setup/test-data
          # Copy fcoreutils binaries
          cp -a "$HOME/.local/bin"/* ci-setup/bin/
          # Copy hyperfine binary
          cp "$(which hyperfine)" ci-setup/bin/hyperfine
          # Copy test data
          cp -a /tmp/fcoreutils-test-data/* ci-setup/test-data/

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup-linux
          path: ci-setup/
          compression-level: 6

      - name: Upload sizes
        uses: actions/upload-artifact@v4
        with:
          name: sizes
          path: results/sizes.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Compatibility tests — one per tool (107 parallel jobs)
  # ─────────────────────────────────────────────────────────────────────────────
  compat:
    name: Compat/${{ matrix.tool }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - arch
          - b2sum
          - base32
          - base64
          - basename
          - basenc
          - cat
          - chcon
          - chgrp
          - chmod
          - chown
          - chroot
          - cksum
          - comm
          - cp
          - csplit
          - cut
          - date
          - dd
          - df
          - dir
          - dircolors
          - dirname
          - du
          - echo
          - env
          - expand
          - expr
          - factor
          - "false"
          - fmt
          - fold
          - groups
          - head
          - hostid
          - id
          - install
          - join
          - kill
          - link
          - ln
          - logname
          - ls
          - md5sum
          - mkdir
          - mkfifo
          - mknod
          - mktemp
          - mv
          - nice
          - nl
          - nohup
          - nproc
          - numfmt
          - od
          - paste
          - pathchk
          - pinky
          - pr
          - printenv
          - printf
          - ptx
          - pwd
          - readlink
          - realpath
          - rev
          - rm
          - rmdir
          - runcon
          - seq
          - sha1sum
          - sha224sum
          - sha256sum
          - sha384sum
          - sha512sum
          - shred
          - shuf
          - sleep
          - sort
          - split
          - stat
          - stdbuf
          - stty
          - sum
          - sync
          - tac
          - tail
          - tee
          - "test"
          - timeout
          - touch
          - tr
          - "true"
          - truncate
          - tsort
          - tty
          - uname
          - unexpand
          - uniq
          - unlink
          - uptime
          - users
          - vdir
          - wc
          - who
          - whoami
          - "yes"
    steps:
      - uses: actions/checkout@v4

      - name: Download setup artifact
        uses: actions/download-artifact@v4
        with:
          name: setup-linux
          path: ci-setup

      - name: Restore environment
        run: |
          mkdir -p "$HOME/.local/bin" /tmp/fcoreutils-test-data
          cp -a ci-setup/bin/* "$HOME/.local/bin/"
          cp -a ci-setup/test-data/* /tmp/fcoreutils-test-data/
          chmod +x "$HOME/.local/bin"/*
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run compatibility test
        run: bash tests/commands/run_tool.sh ${{ matrix.tool }}
        continue-on-error: true
        env:
          RESULTS_DIR: ${{ github.workspace }}/results

      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compat-${{ matrix.tool }}
          path: results/${{ matrix.tool }}_results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Benchmarks — one per tool (107 parallel jobs)
  # ─────────────────────────────────────────────────────────────────────────────
  bench:
    name: Bench/${{ matrix.tool }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - arch
          - b2sum
          - base32
          - base64
          - basename
          - basenc
          - cat
          - chcon
          - chgrp
          - chmod
          - chown
          - chroot
          - cksum
          - comm
          - cp
          - csplit
          - cut
          - date
          - dd
          - df
          - dir
          - dircolors
          - dirname
          - du
          - echo
          - env
          - expand
          - expr
          - factor
          - "false"
          - fmt
          - fold
          - groups
          - head
          - hostid
          - id
          - install
          - join
          - kill
          - link
          - ln
          - logname
          - ls
          - md5sum
          - mkdir
          - mkfifo
          - mknod
          - mktemp
          - mv
          - nice
          - nl
          - nohup
          - nproc
          - numfmt
          - od
          - paste
          - pathchk
          - pinky
          - pr
          - printenv
          - printf
          - ptx
          - pwd
          - readlink
          - realpath
          - rev
          - rm
          - rmdir
          - runcon
          - seq
          - sha1sum
          - sha224sum
          - sha256sum
          - sha384sum
          - sha512sum
          - shred
          - shuf
          - sleep
          - sort
          - split
          - stat
          - stdbuf
          - stty
          - sum
          - sync
          - tac
          - tail
          - tee
          - "test"
          - timeout
          - touch
          - tr
          - "true"
          - truncate
          - tsort
          - tty
          - uname
          - unexpand
          - uniq
          - unlink
          - uptime
          - users
          - vdir
          - wc
          - who
          - whoami
          - "yes"
    steps:
      - uses: actions/checkout@v4

      - name: Download setup artifact
        uses: actions/download-artifact@v4
        with:
          name: setup-linux
          path: ci-setup

      - name: Restore environment
        run: |
          mkdir -p "$HOME/.local/bin" /tmp/fcoreutils-test-data
          cp -a ci-setup/bin/* "$HOME/.local/bin/"
          cp -a ci-setup/test-data/* /tmp/fcoreutils-test-data/
          chmod +x "$HOME/.local/bin"/*
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run benchmark
        run: |
          mkdir -p results
          script="tests/benchmarks/bench_${{ matrix.tool }}.sh"
          if [[ -f "$script" ]]; then
            bash "$script"
          else
            echo '{"tool":"${{ matrix.tool }}","status":"NO_BENCHMARK"}' > "results/${{ matrix.tool }}_benchmark.json"
          fi
        continue-on-error: true
        env:
          RESULTS_DIR: ${{ github.workspace }}/results

      - name: Upload result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-${{ matrix.tool }}
          path: results/${{ matrix.tool }}_benchmark.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Functional tests — 4-platform matrix (sequential per platform)
  # ─────────────────────────────────────────────────────────────────────────────
  functional:
    name: Functional (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            triple: aarch64-unknown-linux-gnu
            result_name: linux_aarch64
            run_full_tests: "true"

          - name: macos-arm64
            runner: macos-latest
            triple: aarch64-apple-darwin
            result_name: darwin_arm64
            run_full_tests: "true"

          - name: windows-x86_64
            runner: windows-latest
            triple: x86_64-pc-windows-msvc
            result_name: windows_x86_64
            run_full_tests: "true"

          - name: windows-arm64
            runner: windows-11-arm
            triple: aarch64-pc-windows-msvc
            result_name: windows_arm64
            run_full_tests: "false"

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install fcoreutils ${{ inputs.version }}
        id: install
        run: |
          if bash scripts/install_from_github.sh --version ${{ inputs.version }}; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: Binary not available for ${{ matrix.triple }}, will mark as skipped"
          fi
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add install dir to PATH
        if: steps.install.outputs.installed == 'true'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Write skipped result (no binary available)
        if: steps.install.outputs.installed != 'true'
        run: |
          mkdir -p results/compatibility/${{ inputs.version }}
          python3 - <<'EOF'
          import json, os
          result = {
              "skipped": True,
              "reason": "no binary available for ${{ matrix.triple }}",
              "platform": "${{ matrix.triple }}",
              "type": "compatibility",
          }
          os.makedirs("results/compatibility/${{ inputs.version }}", exist_ok=True)
          with open("results/compatibility/${{ inputs.version }}/${{ matrix.result_name }}.json", "w") as f:
              json.dump(result, f, indent=2)
          print("Wrote skipped result.")
          EOF

      - name: Generate test data
        if: steps.install.outputs.installed == 'true' && matrix.run_full_tests == 'true'
        run: bash tests/helpers/generate_test_data.sh

      - name: Run compatibility tests
        if: steps.install.outputs.installed == 'true' && matrix.run_full_tests == 'true'
        run: bash tests/commands/run_all.sh
        continue-on-error: true
        env:
          RESULTS_DIR: ${{ github.workspace }}/results

      - name: Copy results to versioned path
        if: steps.install.outputs.installed == 'true' && matrix.run_full_tests == 'true'
        run: |
          mkdir -p results/compatibility/${{ inputs.version }}
          cp results/compatibility_results.json \
             results/compatibility/${{ inputs.version }}/${{ matrix.result_name }}.json

      - name: Smoke test (quick sanity check, full tests skipped)
        if: steps.install.outputs.installed == 'true' && matrix.run_full_tests == 'false'
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          echo "Running smoke test for ${{ matrix.name }}"
          INSTALL_DIR="$HOME/.local/bin"
          pass=0; fail=0; crash=0
          for tool in fwc fsort fcut ftr funiq ftac fbase64 fsha256sum fhead ftail fcat; do
            bin="$INSTALL_DIR/$tool"
            if [[ ! -x "$bin" ]]; then
              bin="$INSTALL_DIR/${tool}.exe"
            fi
            if [[ ! -x "$bin" ]]; then
              echo "  MISSING: $tool"
              fail=$((fail+1))
              continue
            fi
            if "$bin" --version >/dev/null 2>&1 || "$bin" --help >/dev/null 2>&1; then
              echo "  OK: $tool"
              pass=$((pass+1))
            else
              echo "  CRASH: $tool (exit $?)"
              crash=$((crash+1))
            fi
          done
          echo "Smoke test: $pass OK, $fail missing, $crash crashed"

          mkdir -p "results/compatibility/${{ inputs.version }}"
          python3 - <<'PYEOF'
          import json, os
          result = {
              "skipped": False,
              "smoke_only": True,
              "reason": "x86_64 binary under ARM64 emulation — full test suite skipped to avoid SIMD crashes",
              "platform": "${{ matrix.triple }}",
              "type": "compatibility",
              "summary": {
                  "total_tests": 0, "passed": 0, "failed": 0, "skipped": 0,
                  "tools_tested": 0, "tools_skipped": 0
              },
              "tools": {}
          }
          path = "results/compatibility/${{ inputs.version }}/${{ matrix.result_name }}.json"
          with open(path, "w") as f:
              json.dump(result, f, indent=2)
          print(f"Wrote smoke-only result to {path}")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functional-${{ matrix.name }}
          path: results/compatibility/${{ inputs.version }}/${{ matrix.result_name }}.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Report — aggregate all results and publish
  # ─────────────────────────────────────────────────────────────────────────────
  report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs: [compat, bench, setup, functional]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all compatibility results
        uses: actions/download-artifact@v4
        with:
          pattern: compat-*
          path: results/compat-raw/
          merge-multiple: true
        continue-on-error: true

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: results/bench-raw/
          merge-multiple: true
        continue-on-error: true

      - name: Download sizes
        uses: actions/download-artifact@v4
        with:
          name: sizes
          path: results/
        continue-on-error: true

      - name: Download functional-linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: functional-linux-arm64
          path: results/compatibility/${{ inputs.version }}/
        continue-on-error: true

      - name: Download functional-macos-arm64
        uses: actions/download-artifact@v4
        with:
          name: functional-macos-arm64
          path: results/compatibility/${{ inputs.version }}/
        continue-on-error: true

      - name: Download functional-windows-x86_64
        uses: actions/download-artifact@v4
        with:
          name: functional-windows-x86_64
          path: results/compatibility/${{ inputs.version }}/
        continue-on-error: true

      - name: Download functional-windows-arm64
        uses: actions/download-artifact@v4
        with:
          name: functional-windows-arm64
          path: results/compatibility/${{ inputs.version }}/
        continue-on-error: true

      - name: Aggregate compatibility results
        run: |
          python3 - <<'PYEOF'
          import json, glob, os
          from datetime import datetime, timezone

          results_dir = "results/compat-raw"
          tool_details = {}
          total_passed = 0
          total_failed = 0
          total_skipped = 0
          total_run = 0
          tools_tested = 0
          tools_skipped = 0

          for f in sorted(glob.glob(os.path.join(results_dir, "*_results.json"))):
              tool_name = os.path.basename(f).replace("_results.json", "")
              try:
                  data = json.load(open(f))
              except Exception as e:
                  tool_details[tool_name] = {
                      "status": "error", "error": str(e),
                      "total": 0, "passed": 0, "failed": 0, "skipped": 0,
                      "failed_tests": []
                  }
                  continue

              status = data.get("status", "")
              if status == "NOT_IMPLEMENTED":
                  tool_details[tool_name] = {
                      "status": "NOT_IMPLEMENTED",
                      "total": 0, "passed": 0, "failed": 0, "skipped": 0,
                      "failed_tests": []
                  }
                  tools_skipped += 1
              else:
                  s = data.get("summary", {})
                  passed = s.get("passed", 0)
                  failed = s.get("failed", 0)
                  skipped = s.get("skipped", 0)
                  total = s.get("total", 0)
                  total_passed += passed
                  total_failed += failed
                  total_skipped += skipped
                  total_run += total
                  tools_tested += 1
                  failed_tests = []
                  for t in data.get("tests", []):
                      if t.get("status") == "FAIL" or t.get("f_status") == "FAIL":
                          failed_tests.append(t.get("name", "?"))
                  tool_details[tool_name] = {
                      "status": "tested",
                      "total": total, "passed": passed,
                      "failed": failed, "skipped": skipped,
                      "failed_tests": failed_tests
                  }

          version = os.environ["VERSION"]
          aggregate = {
              "type": "compatibility",
              "platform": "Linux_x86_64",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "summary": {
                  "total_tests": total_run,
                  "passed": total_passed,
                  "failed": total_failed,
                  "skipped": total_skipped,
                  "tools_tested": tools_tested,
                  "tools_skipped": tools_skipped
              },
              "tools": tool_details
          }

          out_dir = f"results/compatibility/{version}"
          os.makedirs(out_dir, exist_ok=True)
          with open(f"{out_dir}/linux_x86_64.json", "w") as f:
              json.dump(aggregate, f, indent=2)
          print(f"Aggregated {tools_tested + tools_skipped} tool results into {out_dir}/linux_x86_64.json")
          PYEOF
        env:
          VERSION: ${{ inputs.version }}

      - name: Aggregate benchmark results
        run: |
          python3 - <<'PYEOF'
          import json, glob, os, shutil
          from datetime import datetime, timezone

          results_dir = "results/bench-raw"
          tools = {}

          for f in sorted(glob.glob(os.path.join(results_dir, "*_benchmark.json"))):
              try:
                  data = json.load(open(f))
                  tool = data.get("tool", "")
                  if tool:
                      tools[tool] = data
              except Exception:
                  pass

          version = os.environ["VERSION"]
          aggregate = {
              "type": "benchmark",
              "platform": "Linux_x86_64",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "tools": tools
          }

          out_dir = f"results/benchmarks/{version}"
          os.makedirs(out_dir, exist_ok=True)
          with open(f"{out_dir}/linux_x86_64.json", "w") as f:
              json.dump(aggregate, f, indent=2)

          # Copy sizes if available
          if os.path.exists("results/sizes.json"):
              shutil.copy("results/sizes.json", f"{out_dir}/linux_x86_64_sizes.json")

          print(f"Aggregated {len(tools)} benchmark results into {out_dir}/linux_x86_64.json")
          PYEOF
        env:
          VERSION: ${{ inputs.version }}

      - name: Install Python dependencies
        run: pip install matplotlib

      - name: Generate README (main compatibility table)
        run: python scripts/generate_report.py
        continue-on-error: true

      - name: Generate speedup chart
        run: python scripts/plot_speedup.py
        continue-on-error: true

      - name: Append multi-platform section to README
        run: |
          python3 - <<'PYEOF'
          import json, os, re

          version = os.environ["VERSION"]
          base    = f"results/compatibility/{version}"

          platforms = [
              ("Linux x86_64",  "linux_x86_64.json"),
              ("Linux ARM64",   "linux_aarch64.json"),
              ("macOS ARM64",   "darwin_arm64.json"),
              ("Windows x86_64","windows_x86_64.json"),
              ("Windows ARM64", "windows_arm64.json"),
          ]

          rows = []
          for label, fname in platforms:
              path = os.path.join(base, fname)
              if not os.path.exists(path):
                  rows.append(f"| {label} | — | — | — | ⏭️ missing |")
                  continue
              data = json.load(open(path))
              if data.get("skipped"):
                  reason = data.get("reason", "no binary available")
                  rows.append(f"| {label} | — | — | — | ⏭️ {reason} |")
                  continue
              if data.get("smoke_only"):
                  reason = data.get("reason", "smoke test only")
                  rows.append(f"| {label} | — | — | — | 🔍 {reason} |")
                  continue
              s       = data.get("summary", {})
              passed  = s.get("passed", 0)
              failed  = s.get("failed", 0)
              skipped = s.get("skipped", 0)
              total   = passed + failed + skipped
              if total == 0:
                  status = "⏭️ no tests ran"
              elif failed == 0:
                  status = "✅"
              else:
                  status = "⚠️"
              rows.append(f"| {label} | {passed} | {failed} | {skipped} | {status} |")

          section = f"""## Platform Functional Tests ({version})

          | Platform | Passed | Failed | Skipped | Status |
          |----------|--------|--------|---------|--------|
          """ + "\n".join(rows) + "\n"

          section = "\n".join(line.strip() for line in section.splitlines()) + "\n"

          readme = "README.md"
          if not os.path.exists(readme):
              with open(readme, "w") as f:
                  f.write(section)
          else:
              content = open(readme).read()
              pattern = r"## Platform Functional Tests \(.*?\)\n[\s\S]*?(?=\n##|\Z)"
              if re.search(pattern, content):
                  content = re.sub(pattern, section.rstrip(), content)
              else:
                  content = content.rstrip() + "\n\n" + section
              with open(readme, "w") as f:
                  f.write(content)
          print(f"README.md updated with platform section for {version}.")
          PYEOF
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit and push results
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "results/compatibility/$VERSION/" \
                  "results/benchmarks/$VERSION/" \
                  results/speedup-history.png \
                  README.md

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Update test report $VERSION"
            git push
          fi
