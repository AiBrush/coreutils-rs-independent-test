name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  discover-versions:
    runs-on: ubuntu-latest
    name: Discover versions to benchmark
    outputs:
      versions: ${{ steps.discover.outputs.versions }}
      latest: ${{ steps.discover.outputs.latest }}
      has_versions: ${{ steps.discover.outputs.has_versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover un-benchmarked versions
        id: discover
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all non-draft, non-prerelease releases
          releases=$(curl -sS -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/AiBrush/coreutils-rs/releases?per_page=100" | \
            python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          tags = []
          for r in releases:
              if not r.get('draft') and not r.get('prerelease'):
                  tags.append(r['tag_name'])
          # Sort by version number
          import re
          def ver(t):
              m = re.match(r'v?(\d+)\.(\d+)\.(\d+)', t)
              return (int(m.group(1)), int(m.group(2)), int(m.group(3))) if m else (0,0,0)
          tags.sort(key=ver)
          for t in tags:
              print(t)
          ")

          echo "All releases:"
          echo "$releases"

          # Check which versions already have results
          new_versions=()
          latest=""
          for tag in $releases; do
              latest="$tag"
              # Check if results exist for this version on any platform
              if [[ -d "results/benchmarks/$tag" ]] && ls results/benchmarks/$tag/*.json &>/dev/null; then
                  echo "  $tag: already benchmarked, skipping"
              else
                  echo "  $tag: NEW — will benchmark"
                  new_versions+=("$tag")
              fi
          done

          # Limit to 5 versions per run to avoid CI timeout
          # (results accumulate across runs — daily schedule catches up)
          MAX_VERSIONS=5
          if [[ ${#new_versions[@]} -gt $MAX_VERSIONS ]]; then
              echo "Limiting to $MAX_VERSIONS versions (${#new_versions[@]} total new)"
              new_versions=("${new_versions[@]: -$MAX_VERSIONS}")
          fi

          # Build JSON array of new versions
          json_versions=$(printf '%s\n' "${new_versions[@]}" | python3 -c "
          import sys, json
          versions = [l.strip() for l in sys.stdin if l.strip()]
          print(json.dumps(versions))
          ")

          echo "versions=$json_versions" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [[ ${#new_versions[@]} -gt 0 ]]; then
              echo "has_versions=true" >> "$GITHUB_OUTPUT"
          else
              echo "has_versions=false" >> "$GITHUB_OUTPUT"
          fi

          echo ""
          echo "New versions to benchmark: ${new_versions[*]:-none}"
          echo "Latest release: $latest"

  compatibility:
    needs: discover-versions
    if: needs.discover-versions.outputs.latest != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            name: Linux x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
            name: Linux ARM64
          - os: macos-latest
            arch: arm64
            name: macOS ARM64
          - os: windows-latest
            arch: x86_64
            name: Windows x86_64
          # windows-11-arm excluded: no pre-built ARM64 Windows binaries available

    runs-on: ${{ matrix.os }}
    name: Tests - ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fcoreutils from GitHub releases
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/install_from_github.sh
          INSTALL_DIR="$HOME/.local/bin" ./scripts/install_from_github.sh --version "${{ needs.discover-versions.outputs.latest }}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install GNU coreutils (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          for tool in wc cut sha256sum md5sum b2sum base64 sort tr uniq tac; do
            if command -v g$tool &>/dev/null; then
              sudo ln -sf "$(which g$tool)" "/usr/local/bin/$tool"
            fi
          done
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Install GNU coreutils (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "Using system coreutils from Git Bash"
          which wc cut sha256sum md5sum sort tr uniq || echo "Some tools may be missing on Windows"

      - name: Verify tool installation
        shell: bash
        run: |
          echo "=== fcoreutils ==="
          for tool in fwc fcut fsha256sum fmd5sum fb2sum fbase64 fsort ftr funiq ftac; do
            if command -v $tool &>/dev/null; then
              echo "  $tool: $(which $tool)"
            else
              echo "  $tool: NOT FOUND"
            fi
          done

          echo ""
          echo "=== GNU coreutils ==="
          for tool in wc cut sha256sum md5sum b2sum base64 sort tr uniq tac; do
            if command -v $tool &>/dev/null; then
              echo "  $tool: $(which $tool)"
            else
              echo "  $tool: NOT FOUND"
            fi
          done

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Make test scripts executable
        shell: bash
        run: chmod +x tests/compatibility/*.sh tests/helpers/*.sh tests/stress/*.sh 2>/dev/null || true

      - name: Run compatibility tests
        shell: bash
        run: |
          export RESULTS_DIR="${GITHUB_WORKSPACE}/results"
          export TEST_DATA_DIR="/tmp/fcoreutils-test-data"
          mkdir -p "$RESULTS_DIR"
          bash tests/compatibility/run_all.sh || true

      - name: Run stress tests
        shell: bash
        run: |
          export RESULTS_DIR="${GITHUB_WORKSPACE}/results"
          export TEST_DATA_DIR="/tmp/fcoreutils-test-data"
          bash tests/stress/stress_tests.sh || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-results-${{ matrix.os }}-${{ matrix.arch }}
          path: results/
          retention-days: 30

      - name: Upload failed tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-tests-${{ matrix.os }}-${{ matrix.arch }}
          path: tests/failed_tests/
          retention-days: 30
          if-no-files-found: ignore

      - name: Print summary
        if: always()
        shell: bash
        run: |
          echo "## Compatibility Results - ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "results/compatibility_results.json" ]]; then
            python3 -c "
          import json
          d = json.load(open('results/compatibility_results.json'))
          s = d['summary']
          print(f\"| Metric | Value |\")
          print(f\"|--------|-------|\")
          print(f\"| Total Tests | {s['total_tests']} |\")
          print(f\"| Passed | {s['passed']} |\")
          print(f\"| Failed | {s['failed']} |\")
          print(f\"| Skipped | {s['skipped']} |\")
          print(f\"| Tools Tested | {s['tools_tested']} |\")
          print(f\"| Tools Skipped | {s['tools_skipped']} |\")
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "No results file found." >> $GITHUB_STEP_SUMMARY
          fi

  benchmarks:
    needs: discover-versions
    if: needs.discover-versions.outputs.has_versions == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            name: Linux x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
            name: Linux ARM64

    runs-on: ${{ matrix.os }}
    name: Bench - ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (for hyperfine)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-bench-

      - name: Cache uutils build
        uses: actions/cache@v4
        with:
          path: /tmp/uutils-build/target
          key: ${{ runner.os }}-${{ matrix.arch }}-uutils-build
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-uutils-build

      - name: Install hyperfine
        shell: bash
        run: |
          if ! command -v hyperfine &>/dev/null; then
            cargo install hyperfine
          fi

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Make scripts executable
        shell: bash
        run: chmod +x tests/benchmarks/*.sh tests/helpers/*.sh scripts/*.sh 2>/dev/null || true

      - name: Build uutils/coreutils
        shell: bash
        run: |
          echo "Building uutils/coreutils from source..."
          if ./scripts/install_uutils.sh; then
            export UUTILS_DIR="/tmp/uutils-build/target/release"
            echo "UUTILS_DIR=$UUTILS_DIR" >> $GITHUB_ENV
            echo "uutils built successfully at $UUTILS_DIR"
            ls -la "$UUTILS_DIR"/{wc,sort,cut,tr,uniq,tac,base64,md5sum,b2sum,sha256sum} 2>/dev/null || true
          else
            echo "WARNING: uutils build failed. Benchmarks will run without uutils."
          fi

      - name: Benchmark all new versions
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSIONS='${{ needs.discover-versions.outputs.versions }}'
          echo "Versions to benchmark: $VERSIONS"

          # Detect platform tag for result filenames
          OS_NAME=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          PLATFORM_TAG="${OS_NAME}_${ARCH}"

          # Parse JSON array into space-separated list
          VERSION_LIST=$(echo "$VERSIONS" | python3 -c "
          import sys, json
          versions = json.load(sys.stdin)
          print(' '.join(versions))
          ")

          for VERSION in $VERSION_LIST; do
              [[ -z "$VERSION" ]] && continue
              echo ""
              echo "============================================================"
              echo "  Benchmarking $VERSION on $PLATFORM_TAG"
              echo "============================================================"

              # Install this version (skip if no asset available)
              if ! INSTALL_DIR="$HOME/.local/bin" ./scripts/install_from_github.sh --version "$VERSION" < /dev/null; then
                  echo "WARNING: Could not install $VERSION — skipping"
                  continue
              fi
              export PATH="$HOME/.local/bin:$PATH"

              # Run benchmarks (all tools)
              export RESULTS_DIR="${GITHUB_WORKSPACE}/bench_tmp"
              export TEST_DATA_DIR="/tmp/fcoreutils-test-data"
              export GENERATE_LARGE=true
              export BENCH_WARMUP=3
              export BENCH_RUNS=10
              mkdir -p "$RESULTS_DIR"
              bash tests/benchmarks/run_all.sh < /dev/null || true

              # Copy aggregate results to versioned directory
              DEST_DIR="${GITHUB_WORKSPACE}/versioned_results/benchmarks/${VERSION}"
              mkdir -p "$DEST_DIR"
              if [[ -f "$RESULTS_DIR/benchmark_results.json" ]]; then
                  cp "$RESULTS_DIR/benchmark_results.json" "$DEST_DIR/${PLATFORM_TAG}.json"
                  echo "Saved: $DEST_DIR/${PLATFORM_TAG}.json"
              fi

              # Measure and save binary sizes
              SIZES_FILE="$DEST_DIR/${PLATFORM_TAG}_sizes.json"
              python3 << PYEOF > "$SIZES_FILE" 2>/dev/null || true
          import json, os, shutil
          version = "$VERSION"
          platform_tag = "$PLATFORM_TAG"
          install_dir = os.path.expanduser("~/.local/bin")
          uutils_dir = os.environ.get("UUTILS_DIR", "")
          tools = [
              "wc", "cut", "sha256sum", "md5sum", "b2sum", "base64", "sort", "tr", "uniq", "tac",
              "head", "tail", "cat", "rev", "expand", "unexpand", "fold", "paste", "nl", "comm", "join",
              "basenc", "base32", "ln", "touch", "truncate", "mkdir", "rmdir", "mknod", "mkfifo", "mktemp",
              "seq", "shuf", "tsort", "tee", "sum", "cksum", "sha1sum", "sha224sum", "sha384sum", "sha512sum",
              "id", "groups", "whoami", "logname", "uname", "uptime", "arch", "hostid", "tty", "nproc", "pwd",
              "env", "timeout", "nice", "nohup", "sleep", "sync",
              "true", "false", "link", "unlink", "basename", "dirname", "pathchk", "realpath", "readlink", "dircolors",
              "echo", "factor", "expr", "test",
              "cp", "mv", "rm", "dd", "split", "csplit", "install", "shred", "chmod", "chown", "chgrp",
              "yes",
          ]
          sizes = {}
          for tool in tools:
              entry = {}
              for ext in ["", ".exe"]:
                  f_path = os.path.join(install_dir, "f" + tool + ext)
                  if os.path.exists(f_path):
                      entry["f_bytes"] = os.path.getsize(f_path)
                      break
              gnu_path = shutil.which(tool)
              if gnu_path:
                  try:
                      entry["gnu_bytes"] = os.path.getsize(gnu_path)
                  except OSError:
                      pass
              if uutils_dir:
                  for ext in ["", ".exe"]:
                      u_path = os.path.join(uutils_dir, tool + ext)
                      if os.path.exists(u_path):
                          entry["uutils_bytes"] = os.path.getsize(u_path)
                          break
              if entry:
                  sizes[tool] = entry
          print(json.dumps({"type": "binary_sizes", "platform": platform_tag, "version": version, "sizes": sizes}, indent=2))
          PYEOF
              echo "Binary sizes saved: $SIZES_FILE"

              # Run compatibility tests (all tools)
              export RESULTS_DIR="${GITHUB_WORKSPACE}/compat_tmp"
              mkdir -p "$RESULTS_DIR"
              bash tests/compatibility/run_all.sh < /dev/null || true

              COMPAT_DEST="${GITHUB_WORKSPACE}/versioned_results/compatibility/${VERSION}"
              mkdir -p "$COMPAT_DEST"
              if [[ -f "$RESULTS_DIR/compatibility_results.json" ]]; then
                  cp "$RESULTS_DIR/compatibility_results.json" "$COMPAT_DEST/${PLATFORM_TAG}.json"
                  echo "Saved: $COMPAT_DEST/${PLATFORM_TAG}.json"
              fi

              # Cleanup for next version
              rm -rf "${GITHUB_WORKSPACE}/bench_tmp" "${GITHUB_WORKSPACE}/compat_tmp"
          done || true

      - name: Upload versioned results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: versioned-results-${{ matrix.os }}-${{ matrix.arch }}
          path: versioned_results/
          retention-days: 90

      - name: Print summary
        if: always()
        shell: bash
        run: |
          echo "## Benchmark Results - ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Benchmarked versions: ${{ needs.discover-versions.outputs.versions }}" >> $GITHUB_STEP_SUMMARY

  test-new-tools:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            name: Linux x86_64

    runs-on: ${{ matrix.os }}
    name: New Tools - ${{ matrix.name }}

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-new-tools-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-new-tools-

      - name: Cache coreutils-rs build
        uses: actions/cache@v4
        with:
          path: /tmp/coreutils-rs-build/target
          key: ${{ runner.os }}-${{ matrix.arch }}-coreutils-rs-build
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-coreutils-rs-build

      - name: Build fcoreutils from source
        shell: bash
        run: |
          CLONE_DIR="/tmp/coreutils-rs-build"
          INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"

          if [[ -d "$CLONE_DIR/.git" ]]; then
              echo "Updating existing clone..."
              cd "$CLONE_DIR"
              git fetch origin
              git reset --hard origin/main
          else
              echo "Cloning coreutils-rs..."
              rm -rf "$CLONE_DIR"
              git clone https://github.com/AiBrush/coreutils-rs.git "$CLONE_DIR"
              cd "$CLONE_DIR"
          fi

          echo "Building all fcoreutils binaries..."
          cargo build --release 2>&1

          # Copy all f* binaries to install dir
          if [[ "$(uname -s)" == MINGW* ]] || [[ "$(uname -s)" == MSYS* ]] || [[ "$(uname -s)" == CYGWIN* ]]; then
              find target/release -maxdepth 1 -name "f*.exe" -type f -exec cp {} "$INSTALL_DIR/" \;
          else
              for bin in target/release/f*; do
                  [[ -x "$bin" && ! -d "$bin" && ! "$bin" == *.d ]] && cp "$bin" "$INSTALL_DIR/"
              done
          fi

          echo "$INSTALL_DIR" >> $GITHUB_PATH
          export PATH="$INSTALL_DIR:$PATH"

          echo ""
          echo "=== Installed fcoreutils binaries ==="
          for tool in fwc fcut fsha256sum fmd5sum fb2sum fbase64 fsort ftr funiq ftac \
              fhead ftail fcat frev fexpand funexpand ffold fpaste fnl fcomm fjoin \
              fbasenc fbase32 fln ftouch ftruncate fmkdir frmdir fmknod fmkfifo fmktemp \
              fseq fshuf ftsort ftee fsum fcksum fsha1sum fsha224sum fsha384sum fsha512sum \
              fid fgroups fwhoami flogname funame fuptime farch fhostid ftty fnproc fpwd \
              fenv ftimeout fnice fnohup fsleep fsync ftrue ffalse flink funlink \
              fbasename fdirname fpathchk frealpath freadlink fdircolors \
              fecho fusers fprintf ftest fexpr ffactor fsplit fnumfmt ffmt fcsplit fod fptx \
              fstat fwho fpinky fdate fdf fdu fstty fchmod fchown fchgrp fshred fdd \
              frm fcp fmv finstall fpr fls fstdbuf; do
              if command -v "$tool" &>/dev/null; then
                  echo "  $tool: $(which $tool)"
              elif [[ -x "$INSTALL_DIR/$tool" ]] || [[ -x "$INSTALL_DIR/$tool.exe" ]]; then
                  echo "  $tool: $INSTALL_DIR/$tool"
              else
                  echo "  $tool: NOT FOUND"
              fi
          done

      - name: Install GNU coreutils (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          for tool in wc cut sha256sum md5sum b2sum base64 sort tr uniq tac head tail cat rev expand unexpand fold paste nl comm join \
              basenc base32 ln touch truncate mkdir rmdir mknod mkfifo mktemp \
              seq shuf tsort tee sum cksum sha1sum sha224sum sha384sum sha512sum \
              id groups whoami logname uname uptime arch hostid tty nproc pwd \
              env timeout nice nohup sleep sync true false link unlink \
              basename dirname pathchk realpath readlink dircolors \
              echo printf test expr factor split numfmt fmt csplit od ptx \
              stat who pinky date df du stty chmod chown chgrp shred dd \
              rm cp mv install pr ls stdbuf users; do
            if command -v g$tool &>/dev/null; then
              sudo ln -sf "$(which g$tool)" "/usr/local/bin/$tool"
            fi
          done
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Install GNU coreutils (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "Using system coreutils from Git Bash"
          for tool in wc cut sha256sum md5sum sort tr uniq head tail cat rev expand unexpand fold paste nl comm join \
              basenc base32 ln touch truncate mkdir rmdir mktemp \
              seq shuf tsort tee sum cksum sha1sum sha224sum sha384sum sha512sum \
              id groups whoami uname arch nproc pwd \
              env timeout sleep true false link unlink \
              basename dirname realpath readlink; do
            if command -v $tool &>/dev/null; then
              echo "  $tool: $(which $tool)"
            else
              echo "  $tool: NOT FOUND"
            fi
          done

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Make test scripts executable
        shell: bash
        run: chmod +x tests/compatibility/*.sh tests/helpers/*.sh tests/stress/*.sh tests/benchmarks/*.sh 2>/dev/null || true

      - name: Run new tools compatibility tests
        shell: bash
        run: |
          export RESULTS_DIR="${GITHUB_WORKSPACE}/results"
          export TEST_DATA_DIR="/tmp/fcoreutils-test-data"
          mkdir -p "$RESULTS_DIR"
          bash tests/compatibility/run_all.sh || true

      - name: Measure binary sizes
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, os, shutil
          install_dir = os.path.expanduser("~/.local/bin")
          tools = [
              "wc","cut","sha256sum","md5sum","b2sum","base64","sort","tr","uniq","tac",
              "head","tail","cat","rev","expand","unexpand","fold","paste","nl","comm","join",
              "basenc","base32","ln","touch","truncate","mkdir","rmdir","mknod","mkfifo","mktemp",
              "seq","shuf","tsort","tee","sum","cksum","sha1sum","sha224sum","sha384sum","sha512sum",
              "id","groups","whoami","logname","uname","uptime","arch","hostid","tty","nproc","pwd",
              "env","timeout","nice","nohup","sleep","sync",
              "true","false","link","unlink","basename","dirname","pathchk","realpath","readlink","dircolors",
              "echo","factor","expr","test",
              "cp","mv","rm","dd","split","csplit","install","shred","chmod","chown","chgrp","yes",
          ]
          sizes = {}
          for tool in tools:
              entry = {}
              fp = os.path.join(install_dir, "f" + tool)
              if os.path.exists(fp):
                  entry["f_bytes"] = os.path.getsize(fp)
              gp = shutil.which(tool)
              if gp:
                  try:
                      entry["gnu_bytes"] = os.path.getsize(gp)
                  except OSError:
                      pass
              if entry:
                  sizes[tool] = entry
          out = {"type": "source_sizes", "sizes": sizes}
          results_dir = os.environ.get("GITHUB_WORKSPACE", ".") + "/results"
          os.makedirs(results_dir, exist_ok=True)
          with open(results_dir + "/source_sizes.json", "w") as f:
              json.dump(out, f, indent=2)
          print(f"Saved sizes for {len(sizes)} tools")
          PYEOF

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-compat-${{ matrix.os }}-${{ matrix.arch }}
          path: results/
          retention-days: 30

      - name: Print summary
        if: always()
        shell: bash
        run: |
          echo "## New Tools Compatibility - ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "results/compatibility_results.json" ]]; then
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json

          d = json.load(open('results/compatibility_results.json'))
          s = d['summary']
          tools = d.get('tools', {})

          # Overall summary table
          print("| Metric | Value |")
          print("|--------|-------|")
          print(f"| Total Tests | {s['total_tests']} |")
          print(f"| Passed | {s['passed']} |")
          print(f"| Failed | {s['failed']} |")
          print(f"| Skipped | {s['skipped']} |")
          print(f"| Tools Tested | {s['tools_tested']} |")
          print(f"| Tools Skipped | {s['tools_skipped']} |")
          print()

          if not tools:
              print("_No per-tool data available._")
          else:
              # Group tools by category for readability
              categories = [
                  ('Text Processing (original)', ['head', 'tail', 'cat', 'rev', 'expand', 'unexpand', 'fold', 'paste', 'nl', 'comm', 'join']),
                  ('Encoding/Decoding', ['basenc', 'base32']),
                  ('File Operations', ['ln', 'touch', 'truncate', 'mkdir', 'rmdir', 'mknod', 'mkfifo', 'mktemp']),
                  ('Text/Data Processing', ['seq', 'shuf', 'tsort', 'tee', 'sum', 'cksum', 'sha1sum', 'sha224sum', 'sha384sum', 'sha512sum']),
                  ('System Information', ['id', 'groups', 'whoami', 'logname', 'uname', 'uptime', 'arch', 'hostid', 'tty', 'nproc', 'pwd']),
                  ('Process/Environment', ['env', 'timeout', 'nice', 'nohup', 'sleep', 'sync']),
                  ('Utility Commands', ['true', 'false', 'link', 'unlink', 'basename', 'dirname', 'pathchk', 'realpath', 'readlink', 'dircolors']),
                  ('PR #241 - I/O & Text', ['echo', 'printf', 'pr', 'fmt', 'ptx', 'od', 'numfmt', 'factor', 'expr', 'test']),
                  ('PR #241 - File Ops', ['cp', 'mv', 'rm', 'dd', 'split', 'csplit', 'install', 'shred', 'chmod', 'chown', 'chgrp']),
                  ('PR #241 - System & FS', ['ls', 'stat', 'df', 'du', 'date', 'who', 'users', 'pinky', 'stty', 'stdbuf']),
              ]

              print("### Per-Tool Results")
              print()

              for cat_name, cat_tools in categories:
                  # Check if any tool in this category has data
                  has_data = any(t in tools for t in cat_tools)
                  if not has_data:
                      continue

                  print(f"#### {cat_name}")
                  print()
                  print("| Tool | Status | Passed | Failed | Skipped | Total |")
                  print("|------|--------|--------|--------|---------|-------|")

                  for tool in cat_tools:
                      info = tools.get(tool, {})
                      status = info.get('status', 'no_data')
                      if status == 'NOT_IMPLEMENTED':
                          print(f"| {tool} | :white_circle: skipped | - | - | - | - |")
                      elif status == 'tested':
                          p = info.get('passed', 0)
                          fl = info.get('failed', 0)
                          sk = info.get('skipped', 0)
                          t = info.get('total', 0)
                          if fl == 0:
                              icon = ':white_check_mark:'
                          else:
                              icon = ':x:'
                          f_str = f"**{fl}**" if fl > 0 else str(fl)
                          print(f"| {tool} | {icon} | {p} | {f_str} | {sk} | {t} |")
                      elif status == 'error':
                          print(f"| {tool} | :warning: error | - | - | - | - |")
                      else:
                          print(f"| {tool} | :grey_question: no data | - | - | - | - |")
                  print()

              # Show failed test details in collapsible section
              any_failures = any(
                  info.get('failed', 0) > 0
                  for info in tools.values()
                  if info.get('status') == 'tested'
              )
              if any_failures:
                  print("<details>")
                  print("<summary>:x: Failed test details</summary>")
                  print()
                  for tool in sorted(tools.keys()):
                      info = tools[tool]
                      if info.get('status') == 'tested' and info.get('failed', 0) > 0:
                          failed_tests = info.get('failed_tests', [])
                          print(f"**{tool}** ({info['failed']} failed):")
                          if failed_tests:
                              for ft in failed_tests:
                                  print(f"- `{ft}`")
                          else:
                              print("- _(test names not available)_")
                          print()
                  print("</details>")
          PYEOF
          else
            echo "No results file found." >> $GITHUB_STEP_SUMMARY
          fi

  bench-new-tools:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            name: Linux x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
            name: Linux ARM64

    runs-on: ${{ matrix.os }}
    name: Bench New Tools - ${{ matrix.name }}

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-new-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-new-bench-

      - name: Cache coreutils-rs build
        uses: actions/cache@v4
        with:
          path: /tmp/coreutils-rs-build/target
          key: ${{ runner.os }}-${{ matrix.arch }}-coreutils-rs-build
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-coreutils-rs-build

      - name: Cache uutils build
        uses: actions/cache@v4
        with:
          path: /tmp/uutils-build/target
          key: ${{ runner.os }}-${{ matrix.arch }}-uutils-new-tools-build
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-uutils-new-tools-build

      - name: Install hyperfine
        shell: bash
        run: |
          if ! command -v hyperfine &>/dev/null; then
            cargo install hyperfine
          fi

      - name: Make scripts executable
        shell: bash
        run: chmod +x tests/benchmarks/*.sh tests/helpers/*.sh scripts/*.sh 2>/dev/null || true

      - name: Build uutils/coreutils
        shell: bash
        run: |
          echo "Building uutils/coreutils from source..."
          if ./scripts/install_uutils.sh --tools all; then
            export UUTILS_DIR="/tmp/uutils-build/target/release"
            echo "UUTILS_DIR=$UUTILS_DIR" >> $GITHUB_ENV
            echo "uutils built successfully at $UUTILS_DIR"
            ls -la "$UUTILS_DIR"/{wc,sort,uniq,cut,tr,base64,tac,md5sum,b2sum,sha256sum,head,tail,cat,expand,unexpand,fold,paste,nl,comm,join} 2>/dev/null || true
          else
            echo "WARNING: uutils build failed. Benchmarks will run without uutils comparison."
          fi

      - name: Build fcoreutils from source
        shell: bash
        run: |
          CLONE_DIR="/tmp/coreutils-rs-build"
          INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"

          if [[ -d "$CLONE_DIR/.git" ]]; then
              echo "Updating existing clone..."
              cd "$CLONE_DIR"
              git fetch origin
              git reset --hard origin/main
          else
              echo "Cloning coreutils-rs..."
              rm -rf "$CLONE_DIR"
              git clone https://github.com/AiBrush/coreutils-rs.git "$CLONE_DIR"
              cd "$CLONE_DIR"
          fi

          echo "Building all fcoreutils binaries..."
          cargo build --release 2>&1

          for bin in target/release/f*; do
              [[ -x "$bin" && ! -d "$bin" && ! "$bin" == *.d ]] && cp "$bin" "$INSTALL_DIR/"
          done

          echo "$INSTALL_DIR" >> $GITHUB_PATH
          export PATH="$INSTALL_DIR:$PATH"

          echo ""
          echo "=== Installed fcoreutils binaries ==="
          for tool in fhead ftail fcat frev fexpand funexpand ffold fpaste fnl fcomm fjoin \
              fbasenc fbase32 fln ftouch ftruncate fmkdir frmdir fmknod fmkfifo fmktemp \
              fseq fshuf ftsort ftee fsum fcksum fsha1sum fsha224sum fsha384sum fsha512sum \
              fid fgroups fwhoami flogname funame fuptime farch fhostid ftty fnproc fpwd \
              fenv ftimeout fnice fnohup fsleep fsync ftrue ffalse flink funlink \
              fbasename fdirname fpathchk frealpath freadlink fdircolors \
              fecho fusers fprintf ftest fexpr ffactor fsplit fnumfmt ffmt fcsplit fod fptx \
              fstat fwho fpinky fdate fdf fdu fstty fchmod fchown fchgrp fshred fdd \
              frm fcp fmv finstall fpr fls fstdbuf; do
              if command -v "$tool" &>/dev/null; then
                  echo "  $tool: $(which $tool)"
              else
                  echo "  $tool: NOT FOUND"
              fi
          done

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run new tools benchmarks
        shell: bash
        run: |
          export RESULTS_DIR="${GITHUB_WORKSPACE}/results"
          export TEST_DATA_DIR="/tmp/fcoreutils-test-data"
          export GENERATE_LARGE=true
          export BENCH_WARMUP=3
          export BENCH_RUNS=10
          mkdir -p "$RESULTS_DIR"
          bash tests/benchmarks/run_all.sh || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-bench-${{ matrix.os }}-${{ matrix.arch }}
          path: results/
          retention-days: 30

      - name: Print summary
        if: always()
        shell: bash
        run: |
          echo "## New Tools Benchmarks - ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -f "results/benchmark_results.json" ]]; then
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json

          d = json.load(open('results/benchmark_results.json'))
          s = d.get('summary', {})
          ts = s.get('tool_summaries', {})

          categories = [
              ('Text Processing (original)', ['head', 'tail', 'cat', 'rev', 'expand', 'unexpand', 'fold', 'paste', 'nl', 'comm', 'join']),
              ('Encoding/Decoding', ['basenc', 'base32']),
              ('File Operations', ['ln', 'touch', 'truncate', 'mkdir', 'rmdir', 'mknod', 'mkfifo', 'mktemp']),
              ('Text/Data Processing', ['seq', 'tsort', 'tee', 'sum', 'cksum', 'sha1sum', 'sha224sum', 'sha384sum', 'sha512sum']),
              ('System Information', ['id', 'groups', 'whoami', 'logname', 'uname', 'arch', 'hostid', 'tty', 'nproc', 'pwd']),
              ('Process/Environment', ['env', 'nice', 'nohup', 'sleep', 'sync']),
              ('Utility Commands', ['true', 'false', 'link', 'unlink', 'basename', 'dirname', 'pathchk', 'realpath', 'readlink']),
              ('I/O & Text', ['echo', 'factor', 'expr', 'test']),
              ('File Ops', ['cp', 'mv', 'rm', 'dd', 'split', 'csplit', 'install', 'shred', 'chmod', 'chown', 'chgrp']),
          ]

          for cat_name, cat_tools in categories:
              print(f"#### {cat_name}")
              print()
              print("| Tool | Avg Speedup vs GNU | Avg Speedup vs uutils |")
              print("|------|--------------------|-----------------------|")

              for tool in cat_tools:
                  info = ts.get(tool, {})
                  if not isinstance(info, dict) or info.get('status') != 'benchmarked':
                      gnu_str = ""
                      u_str = ""
                  else:
                      gnu_sp = info.get('avg_speedup_vs_gnu')
                      gnu_str = f"{gnu_sp}x" if gnu_sp is not None else ""
                      u_sp = info.get('avg_speedup_vs_uutils')
                      u_str = f"{u_sp}x" if u_sp is not None else ""

                  if tool in ('mv', 'csplit'):
                      print(f"| {tool} | | - | - | - | - |")
                  else:
                      print(f"| {tool} | {gnu_str} | {u_str} |")

              print()
          PYEOF
          else
            echo "No benchmark results file found." >> $GITHUB_STEP_SUMMARY
          fi

  report:
    needs: [discover-versions, compatibility, benchmarks, test-new-tools]
    if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: Publish Report

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install matplotlib

      - name: Download versioned results
        uses: actions/download-artifact@v4
        with:
          pattern: versioned-results-*
          path: new_results/
          merge-multiple: true
        continue-on-error: true

      - name: Download source-compat results (Linux x86_64)
        uses: actions/download-artifact@v4
        with:
          name: source-compat-ubuntu-latest-x86_64
          path: new_tools_compat/
        continue-on-error: true

      - name: Download source-bench results (Linux x86_64)
        uses: actions/download-artifact@v4
        with:
          name: source-bench-ubuntu-latest-x86_64
          path: new_tools_bench/
        continue-on-error: true

      - name: Merge new results into results/
        shell: bash
        run: |
          echo "=== New results from this CI run ==="
          find new_results/ -type f 2>/dev/null | head -50 || echo "No new results"

          # Merge new versioned results into the repo's results/ directory
          if [[ -d "new_results/benchmarks" ]]; then
              for version_dir in new_results/benchmarks/v*/; do
                  version=$(basename "$version_dir")
                  dest="results/benchmarks/${version}"
                  mkdir -p "$dest"
                  cp -v "$version_dir"*.json "$dest/" 2>/dev/null || true
              done
          fi

          if [[ -d "new_results/compatibility" ]]; then
              for version_dir in new_results/compatibility/v*/; do
                  version=$(basename "$version_dir")
                  dest="results/compatibility/${version}"
                  mkdir -p "$dest"
                  cp -v "$version_dir"*.json "$dest/" 2>/dev/null || true
              done
          fi

          # Merge source-built results into results/ (for use by generate_report.py)
          if [[ -f "new_tools_compat/compatibility_results.json" ]]; then
              cp -v "new_tools_compat/compatibility_results.json" "results/source_compat.json"
              echo "Merged source compat results"
          fi
          if [[ -f "new_tools_compat/source_sizes.json" ]]; then
              cp -v "new_tools_compat/source_sizes.json" "results/source_sizes.json"
              echo "Merged source sizes results"
          fi
          if [[ -f "new_tools_bench/benchmark_results.json" ]]; then
              cp -v "new_tools_bench/benchmark_results.json" "results/source_bench.json"
              echo "Merged source bench results"
          fi

          echo ""
          echo "=== All results ==="
          find results/ -type f | sort | head -100 || echo "No results"

      - name: Generate report and chart
        run: python3 scripts/generate_report.py

      - name: Commit results and report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase || true
          git add results/ README.md || true
          git rm REPORT.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update test report [skip ci]"
          git push || true
